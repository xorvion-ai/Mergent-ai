<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mergent — Console</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg" />
<meta name="description" content="Mergent app — AI multi-agent microservice migration analysis." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="app.css" />
</head>
<body class="app">

<div class="shell" id="shell">
  <!-- ============ SIDEBAR ============ -->
  <aside class="side">
    <div class="side-top">
      <a class="logo" href="#/dashboard" aria-label="Mergent">
        <span class="logo-mark" id="appLogo"></span>
        <span class="logo-word">Merg<b>ent</b></span>
      </a>
    </div>
    <div class="side-new">
      <a class="btn btn-primary" href="#/new"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:17px;height:17px"><path d="M12 5v14M5 12h14"/></svg><span>New analysis</span></a>
    </div>
    <nav class="side-scroll" id="sideNav"></nav>
    <div class="side-foot">
      <a class="foot-profile" href="#/profile" aria-label="Open profile">
        <span class="ava">X</span>
        <div class="who"><div class="nm">Xorvion</div><div class="em">platform@xorvion.dev</div></div>
      </a>
      <button class="ic-btn" id="themeBtn" aria-label="Toggle theme">
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" style="display:none"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
      </button>
    </div>
  </aside>

  <!-- ============ MAIN ============ -->
  <div class="main">
    <header class="topbar">
      <button class="ic-btn-2" id="menuBtn" style="display:none" aria-label="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
      <div class="crumbs" id="crumbs"></div>
      <div class="tb-right">
        <span class="run-pill complete" id="topRunPill" style="display:none"><span class="d"></span> <span>complete</span></span>
        <button class="ic-btn-2" id="tweaksToggle" aria-label="Tweaks"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6"/></svg></button>
        <button class="ic-btn-2" id="topTheme" aria-label="Theme"><svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg><svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="display:none"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg></button>
      </div>
    </header>
    <div class="view" id="view"></div>
  </div>
</div>

<!-- ============ DRAWER ============ -->
<div class="drawer-scrim" id="drawerScrim"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-head"><h3 id="drawerTitle">Detail</h3><button class="dx" id="drawerClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
  <div class="drawer-body" id="drawerBody"></div>
</aside>

<!-- ============ MODAL ============ -->
<div class="modal-scrim" id="modalScrim"><div class="modal" id="modal"></div></div>

<!-- ============ TOAST ============ -->
<div class="toast" id="toast"></div>

<!-- ============ TWEAKS ============ -->
<div id="tweaks">
  <h6>Tweaks</h6>
  <div class="tw-row"><label>Accent color</label><div class="sw-row" data-sw-row></div></div>
  <div class="tw-row"><label>Density</label><div class="seg"><button data-density="comfortable">Comfortable</button><button data-density="compact">Compact</button></div></div>
  <div class="tw-row"><label>Motion</label><div class="seg"><button data-motion="on">On</button><button data-motion="off">Reduced</button></div></div>
</div>
<button id="tweaksBtn" style="display:none"></button>

<script src="data.js"></script>
<script src="api.js"></script>
<script src="icons.js"></script>
<script src="diagram.js"></script>
<script src="views-flow.js"></script>
<script src="views-results.js"></script>
<script src="views-plan.js"></script>
<script src="views-handoff.js"></script>
<script src="views-account.js"></script>
<script src="views-admin.js"></script>
<script src="app.js"></script>
</body>
</html>
